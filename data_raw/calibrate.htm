<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset='utf-8'>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
<link rel="stylesheet" href="style.css">
<title>Самовар</title>

<script src="app.js"></script>
<script>
let stepperStepMlLocal = Number('%StepperStepMl%');
let stepperStepMlI2C = Number('%StepperStepMlI2C%');
let calibrationRunning = Number('%CalibrationRunning%') === 1;
let calibrationPump = calibrationRunning ? '%CalibrationPump%' : '';
let calibrationInFlight = false;

function updateCalibrationButton(){
  document.getElementById('calibrateid').value = calibrationRunning ? 'Зафиксировать 100 мл' : 'Начать калибровку';
  document.getElementById('calibrateid').disabled = calibrationInFlight;
  document.getElementById('pump_type').disabled = calibrationRunning || calibrationInFlight;
  document.getElementById('kstepperspd').disabled = calibrationRunning || calibrationInFlight;
  document.getElementById('save').disabled = calibrationRunning || calibrationInFlight;
}

function getPumpType(){
  var sel = document.getElementById('pump_type');
  if (sel && sel.style.display !== 'none') return sel.value;
  return 'local';
}

function onPumpTypeChange(){
  if (calibrationRunning && calibrationPump) {
    document.getElementById('pump_type').value = calibrationPump;
  }
  var t = getPumpType();
  if (t === 'i2c') {
    document.getElementById('stepperstepml').value = stepperStepMlI2C;
  } else {
    document.getElementById('stepperstepml').value = stepperStepMlLocal;
  }
}

async function readConfirmedCalibrationValue(pump){
  const url = pump === 'i2c' ? '/i2cstepper?device=pump' : '/ajax?messageCursor=0';
  const resp = await fetch(url, { cache: 'no-store' });
  if (!resp.ok) {
    throw new Error(await SamovarApp.responseErrorText(
      resp, 'Не удалось обновить результат калибровки'
    ));
  }
  const data = await resp.json();
  const stepsPerMl = Number(pump === 'i2c' ? data.stepsPerMl : data.StepperStepMl);
  if (!Number.isInteger(stepsPerMl) || stepsPerMl <= 0 || stepsPerMl > 65535) {
    throw new Error('Контроллер вернул некорректный результат калибровки.');
  }
  return stepsPerMl * 100;
}

async function calibrate(){
  if (calibrationInFlight) return false;
  const previousCalibrationRunning = calibrationRunning;
  const previousCalibrationPump = calibrationPump;
  const params = new URLSearchParams();
  let nextCalibrationRunning;
  const pump = calibrationRunning ? calibrationPump : getPumpType();
  params.set('pump', pump);
  if (!calibrationRunning){
    const speed = SamovarApp.readNumericInput('kstepperspd', {
      label: 'Скорость шагового двигателя', integer: true, min: 1, max: 8000
    });
    if (!speed) return false;
    params.set('stpstep', speed.text);
    params.set('start', '1');
    nextCalibrationRunning = true;
  } else {
    params.set('finish', '1');
    nextCalibrationRunning = false;
  }
  calibrationInFlight = true;
  updateCalibrationButton();
  try {
    try {
      let resp = await fetch('/calibrate?' + params.toString());
      if (!resp.ok) {
        SamovarApp.showRequestError(await SamovarApp.responseErrorText(resp, 'Калибровка не принята'));
        return false;
      }
      const acceptance = await SamovarApp.readOperationAcceptance(resp);
      await SamovarApp.waitForOperation(acceptance.operationId);
    } catch (e) {
      calibrationRunning = previousCalibrationRunning;
      calibrationPump = previousCalibrationPump;
      SamovarApp.showRequestError('Ошибка сети при калибровке: ' + e);
      return false;
    }
    calibrationRunning = nextCalibrationRunning;
    calibrationPump = calibrationRunning ? pump : '';
    if (!nextCalibrationRunning) {
      try {
        const confirmedValue = await readConfirmedCalibrationValue(pump);
        if (pump === 'i2c') {
          stepperStepMlI2C = confirmedValue;
        } else {
          stepperStepMlLocal = confirmedValue;
        }
        document.getElementById('stepperstepml').value = String(confirmedValue);
      } catch (e) {
        SamovarApp.showRequestError(
          'Калибровка завершена, но не удалось обновить результат: ' + e
        );
        return false;
      }
    }
    SamovarApp.clearRequestError();
    return true;
  } finally {
    calibrationInFlight = false;
    updateCalibrationButton();
  }
};

async function saveCalibration(event){
  event.preventDefault();
  if (calibrationRunning || calibrationInFlight) {
    SamovarApp.showRequestError('Дождитесь окончания калибровки.');
    return false;
  }
  const steps = SamovarApp.readNumericInput('stepperstepml', {
    label: 'Шагов на 100 мл', integer: true, min: 100, max: 6553500,
    accept: function(v){ return v % 100 === 0; },
    acceptMessage: 'Поле «Шагов на 100 мл» должно быть кратно 100: контроллер хранит шаги на 1 мл.'
  });
  if (!steps) return false;
  // У каждого насоса своя настройка, а поле на странице одно: отправка не по тому
  // имени молча перетрёт калибровку соседнего насоса. Скорость (kstepperspd) не
  // шлём вовсе - это параметр запуска, а не настройка, и /save её не принимает.
  const pump = getPumpType();
  const params = new URLSearchParams();
  params.set(pump === 'i2c' ? 'StepperStepMlI2C' : 'StepperStepMl', String(steps.number / 100));
  // Флаг занятости, а не только своя кнопка: пока сохранение в полёте, calibrate()
  // обязан видеть занятость и не стартовать параллельно - иначе запись настройки
  // и старт калибровки уедут на контроллер одновременно.
  calibrationInFlight = true;
  updateCalibrationButton();
  try {
    const resp = await fetch('/save', { method: 'POST', body: params });
    if (!resp.ok) {
      SamovarApp.showRequestError(await SamovarApp.responseErrorText(resp, 'Настройки не сохранены'));
      return false;
    }
    const acceptance = await SamovarApp.readOperationAcceptance(resp);
    await SamovarApp.waitForOperation(acceptance.operationId);
    if (pump === 'i2c') {
      stepperStepMlI2C = steps.number;
    } else {
      stepperStepMlLocal = steps.number;
    }
    SamovarApp.clearRequestError();
    return true;
  } catch (e) {
    SamovarApp.showRequestError('Настройки не сохранены: ' + e);
    return false;
  } finally {
    calibrationInFlight = false;
    updateCalibrationButton();
  }
}

window.onload = function() {
  SamovarApp.initTheme();
  document.forms.setupform.addEventListener('submit', saveCalibration);
  if (calibrationRunning) document.getElementById('pump_type').value = calibrationPump;
  onPumpTypeChange();
  updateCalibrationButton();
};
</script>
</head>

<body>
<form action='/save' method="post" name="setupform">
<h1>Калибровка шагового двигателя</h1>
<div class="tabcontent" style="display: block;border-top: solid;border-top-width: 1px;border-top-color: rgb(204, 204, 204);">
<h2><label for="pump_type">Насос:</label>
  <select id='pump_type' onchange='onPumpTypeChange();' style="display: %I2CPumpTab%;">
    <option value="local" selected>Встроенный</option>
    <option value="i2c">Внешний (I2C)</option>
  </select>
  <span style="display: %I2CPumpTab%;">(I2C)</span>
</h2>
<h2>Объем жидкости : <span id='start_pressure'>100</span> мл.</h2>
<h2><label for="kstepperspd">Скорость шагового двигателя :</label> <input id='kstepperspd' name='kstepperspd' type='text' inputmode='numeric' value='%StepperStep%' style="width: 6em;"> шагов/сек.</h2>
<h2><label for="stepperstepml">Шагов на 100 мл:</label> <input id='stepperstepml' name='stepperstepml' type='text' inputmode='numeric' value='%StepperStepMl%' style="width: 6em;"></h2>
<input id='calibrateid' type='button' name='calibratenm' value='Начать калибровку' onclick='calibrate();' class="button">
<input id='save' type='submit' value='Сохранить' class="button">
<input id='return' type='button' name='return' value='К настройкам' onclick='javascript:location.href="/setup.htm"' class="button">
</div>
</form>
</body>
</html>
