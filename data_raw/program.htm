<script>
  var pwr_unit = "%pwr_unit%";
var heaterResistance = Number('%HeaterR%');
// Должно совпадать с прошивкой: set_current_power() (power_regulator.h) клампит
// уставку к 230 В и считает предел как 230²/R. При 220 показанные вольты не совпадут
// с реально выставленными - расчёт занижал их примерно на 4%, а мощность на 9%.
var mainsVolt = 230;

var phv = 0;

// ========== КОНФИГУРАЦИЯ КОЛОННЫ (ТОЛЬКО ПРОСМОТР) ==========
var columnParams = null;

function updateHeadsTailsPercent(recalculate) {
  const materialSelect = document.getElementById('loadprogram');
  const headsInput = document.getElementById('vlhp');
  const tailsInput = document.getElementById('vltp');
  
  if (!materialSelect || !headsInput || !tailsInput) {
    return; // Элементы не найдены
  }
  
  const rawMaterialType = parseInt(materialSelect.value) || 0;
  
  // Рекомендуемые проценты на основе типа сырья (из подсказок в интерфейсе)
  let headsPercent, tailsPercent;
  
  switch(rawMaterialType) {
    case 0: // Фрукты
      headsPercent = 8;
      tailsPercent = 5;
      break;
    case 1: // Зерно
      headsPercent = 8; // Среднее от 6-10%
      tailsPercent = 6; // Среднее от 5-7%
      break;
    case 2: // Сахар
      headsPercent = 12; // Среднее от 10-15%
      tailsPercent = 5;
      break;
    default:
      headsPercent = 8;
      tailsPercent = 5;
  }
  
  headsInput.value = headsPercent;
  tailsInput.value = tailsPercent;
  
  // Пересчитываем программу, если она уже загружена
  if (recalculate !== false && typeof set_num === 'function') {
    set_num();
  }
}

async function updateColumnParams() {
  const matSelect = document.getElementById("loadprogram");
  const material = SamovarApp.readNumericInput(matSelect, {
    label: 'Тип сырья', integer: true, min: 0, max: 2
  });
  if (!material) return null;
  try {
    const response = await fetch('/ajax_col_params?mat=' + encodeURIComponent(material.text));
    if (!response.ok) {
      SamovarApp.showRequestError(
        await SamovarApp.responseErrorText(response, 'Параметры колонны не загружены')
      );
      return null;
    }
    const data = await response.json();
    columnParams = data;
    if (displayColumnParams()) SamovarApp.clearRequestError();
    return data;
  } catch (error) {
    SamovarApp.showRequestError('Ошибка сети при загрузке параметров колонны: ' + error);
    return null;
  }
}

function displayColumnParams() {
  if (!columnParams) return false;
  const p = columnParams;
  
  function setTxt(id, val, fixed) {
    if (fixed === undefined) fixed = 0;
    const el = document.getElementById(id);
    if (el) el.textContent = (typeof val === 'number') ? val.toFixed(fixed) : (val || '-');
  };

  setTxt('colFloodPower', p.floodPowerW);
  setTxt('colWorkingPower', p.workingPowerW);
  setTxt('colMaxFlow', p.maxFlowMlH);
  setTxt('colTheoreticalPlates', p.theoreticalPlates, 1);
  
  if (document.getElementById('colHeadsSpeed')) document.getElementById('colHeadsSpeed').textContent = (p.headsFlowMlH / 1000).toFixed(3);
  if (document.getElementById('colBodySpeedMin')) document.getElementById('colBodySpeedMin').textContent = (p.bodyFlowMinMlH / 1000).toFixed(3);
  if (document.getElementById('colBodySpeedMax')) document.getElementById('colBodySpeedMax').textContent = (p.bodyFlowMaxMlH / 1000).toFixed(3);
  
  const heaterMaxPwr = Number(document.getElementById('heaterMaxPower').value);
  if (pwr_unit === 'V' && (!Number.isFinite(heaterMaxPwr) || heaterMaxPwr <= 0)) {
    document.getElementById('columnParamsResults').style.display = 'none';
    SamovarApp.showRequestError('Мощность ТЭНа для расчёта колонны не задана.');
    return false;
  }
  const pUnit = (pwr_unit === 'V') ? ' В' : ' Вт';
  
  if (pwr_unit === 'V') {
    function toVolt(w) { return Math.round(mainsVolt * Math.sqrt(Math.max(0, w) / heaterMaxPwr)); }
    setTxt('colFloodPower', toVolt(p.floodPowerW));
    setTxt('colWorkingPower', toVolt(p.workingPowerW));
    const fu = document.getElementById('floodUnit'); if (fu) fu.textContent = ' В';
    const wu = document.getElementById('workingUnit'); if (wu) wu.textContent = ' В';
  }

  const strategyNote = document.getElementById('strategyNote');
  if (strategyNote) {
    const mat = parseInt(document.getElementById("loadprogram").value);
    const notes = [
      '🍎 <b>Стратегия "Фрукты":</b> Плёночный режим (низкое ФЧ) для сохранения аромата.',
      '🌾 <b>Стратегия "Зерно":</b> Баланс между очисткой и вкусом.',
      '💎 <b>Стратегия "Сахар":</b> Ректификация (высокое ФЧ) для максимальной чистоты.'
    ];
    strategyNote.innerHTML = notes[mat] || notes[2];
  }
  
  const resBlock = document.getElementById('columnParamsResults');
  if (resBlock) resBlock.style.display = 'block';
  return true;
}

function applyRecommendedSpeeds() {
  if (!columnParams) { alert('Параметры не загружены'); return; }
  const p = columnParams;
  const programLines = document.getElementById('prg').childNodes;
  let appliedCount = 0;
  
  for (let i = 1; i < programLines.length; i++) {
    const line = programLines[i];
    if (!line || !line.querySelector) continue;
    const type = line.querySelector('select[name^="ptype"]').value;
    const speedInput = line.querySelector('input[name^="speed"]');
    const powerInput = line.querySelector('input[name^="pvolt"]');
    
    let rSpeed = 0; let rPwr = 0;
    if (type == 'H') { rSpeed = p.headsFlowMlH; rPwr = p.headsPowerW; }
    else if (type == 'B' || type == 'C') { rSpeed = p.bodyFlowMaxMlH; rPwr = (type == 'C' ? p.floodPowerW : p.workingPowerW); }
    else if (type == 'T') { rSpeed = p.tailsFlowMlH; rPwr = p.tailsPowerW; }
    
    if (rSpeed > 0) {
      speedInput.value = (rSpeed / 1000).toFixed(3);
      if (powerInput) {
        if (pwr_unit === 'V') {
          const heaterMaxPwr = Number(document.getElementById('heaterMaxPower').value);
          if (!Number.isFinite(heaterMaxPwr) || heaterMaxPwr <= 0) {
            SamovarApp.showRequestError('Мощность ТЭНа для расчёта колонны не задана.');
            return;
          }
          powerInput.value = Math.round(mainsVolt * Math.sqrt(rPwr / heaterMaxPwr));
        } else {
          powerInput.value = Math.round(rPwr);
        }
      }
      appliedCount++;
    }
  }
  set_num();
  if (appliedCount > 0) alert('Параметры применены');
}

function loadFile(e) {
	var file = e;
	var reader = new FileReader();
	reader.onload = function () {
		document.getElementById('WProgram1').value = reader.result;
		glcalcnum = false;
		calc_program();
	};
	reader.readAsText(file, "UTF-8");
}

function getProgramTemplateFile(value) {
  if (value == 0) return 'program_fruit.txt';
  if (value == 1) return 'program_grain.txt';
  if (value == 2) return 'program_shugar.txt';
  return "";
}

function updateProgramTemplateBaseline() {
  var program = document.getElementById('WProgram1');
  programTemplateBaseline = program ? program.value : "";
}

function programTemplateDirty() {
  var program = document.getElementById('WProgram1');
  if (!program) return false;
  return programTemplateLoaded ? program.value !== programTemplateBaseline : program.value !== "";
}

function restoreProgramTemplateSelect(selectObject) {
  if (programTemplateLoaded) selectObject.value = currentProgramTemplateValue;
}

async function getProgramFromFile(selectObject, options){
  var value = selectObject.value;
  var fn = getProgramTemplateFile(value);
  var skipConfirm = options && options.skipConfirm;
  if (!fn) {
    alert("Неизвестный шаблон программы.");
    restoreProgramTemplateSelect(selectObject);
    return false;
  }
  if (!skipConfirm && programTemplateDirty() && !confirm("Текущая программа изменена. Заменить её шаблоном?")) {
    restoreProgramTemplateSelect(selectObject);
    return false;
  }
  try {
    var response = await fetch(fn);
    if (!response.ok) throw new Error(response.status + ': ' + (response.statusText || 'ошибка HTTP'));
    var data = await response.text();

    updateHeadsTailsPercent(false);
    updateColumnParams();
    document.getElementById('WProgram1').value = data;
    glcalcnum = false;
    calc_program();
    programTemplateLoaded = true;
    currentProgramTemplateValue = String(value);
    updateProgramTemplateBaseline();
    return true;
  } catch (err) {
    restoreProgramTemplateSelect(selectObject);
    alert("Ошибка загрузки шаблона программы: " + err);
    return false;
  }
}

function SaveProgramToFile() {
  var filename, text;
  filename = 'programbackup.txt';

function check_program(str){
  var arrayOfStrings = str.split("\n");
  var prevcnt = 0;
  var ret = true;
  var cnt;
  for (i = 0; i < arrayOfStrings.length; i++){
  	var arrayOfDelim = arrayOfStrings[i].split(";");
  	cnt = arrayOfDelim.length;
  	if (cnt == 1 && arrayOfDelim[0] != "" && i == arrayOfStrings.length - 1) ret = false;
  	else if (prevcnt > 0 && cnt > 1) {
  		if (prevcnt != cnt) ret = false;
  	}
  	prevcnt = cnt;
  }
  return ret;
}

function get_time(tm){
  var s = "";
  l = Math.trunc(tm);
  if (l < 10) s = "0";
  s = s + l + ":";
  l = Math.trunc((tm - Math.trunc(tm)) * 60);
  if (l < 10) s = s + "0";
  s = s + l;
  return s;
}

function set_num(){
    if (!prep_calc()) {
      programerr = true;
      return true;
    }
    programerr = false;
    var e = document.getElementById("prg").childNodes;
    var a;
    var v;
    var t;
    var l;
    var sum = 0;
    var sumh = 0;
    var sumt = 0;
    var sumb = 0;
    var prgc = "";
    var prgo = "";
    for (i=1;i<e.length;i++){
      a = e[i].childNodes[0];
      a.innerText = "";
      if (i < 10) a.innerText = "0";
      a.innerText = a.innerText + i;
      var rowActions = e[i].getElementsByClassName("program-row-action");
      if (rowActions.length === 2) {
        rowActions[0].setAttribute("aria-label", "Добавить строку после " + a.innerText);
        rowActions[1].setAttribute("aria-label", "Удалить строку " + a.innerText);
      }
      //
      if (e[i].childNodes[3].value.indexOf(".") > 0) e[i].childNodes[3].value = e[i].childNodes[3].value.substring(0, e[i].childNodes[3].value.indexOf("."));
      if (e[i].childNodes[3].value.indexOf(",") > 0) e[i].childNodes[3].value = e[i].childNodes[3].value.substring(0, e[i].childNodes[3].value.indexOf(","));
      
      e[i].childNodes[2].value = e[i].childNodes[2].value.replace(",",".");
      e[i].childNodes[5].value = e[i].childNodes[5].value.replace(",",".");

      // Получаем номер емкости из селекта
      var capacitySelect = document.getElementById("pnum" + (i-1));
      var capacityNum = capacitySelect ? capacitySelect.value : "0";

      v = e[i].childNodes[6];
      t = e[i].childNodes[7];
      var vlc = 1;
      if (e[i].childNodes[4].value == "H") {
        vlc = phv / 100;
        sumh = sumh + Number(e[i].childNodes[3].value);
      }
      else if (e[i].childNodes[4].value == "T") {
        vlc = ptv / 100;
      }
      else if (e[i].childNodes[4].value == "P") {
        vlc = 1;
      }
      else if (e[i].childNodes[4].value == "B" || e[i].childNodes[4].value == "C") {
        vlc = pbas / 100;
        sumb = sumb + Number(e[i].childNodes[3].value);
      }
      ll = (e[i].childNodes[3].value * vlc)
      prgc = prgc + e[i].childNodes[4].value + ";";
      if (e[i].childNodes[4].value == "P") {
	    v.value = e[i].childNodes[2].value;
	    a = v.value / 3600;
	    prgc = prgc + v.value;
      }
      else {
        v.value = ll.toFixed(3);
        a = v.value / e[i].childNodes[2].value;
	    prgc = prgc + v.value * 1000;
      }
      prgc = prgc + ";" + e[i].childNodes[2].value + ";" + capacityNum + ";0;" + e[i].childNodes[5].value + "\n";
      t.value = get_time(a);
      sum = sum + Number(a);
      prgo = prgo + capacityNum + ";" + e[i].childNodes[2].value + ";" + e[i].childNodes[3].value + ";" + e[i].childNodes[4].value + ";" + e[i].childNodes[5].value + "\n"
    }
    document.getElementById("sum").value = get_time(sum);
    var err = ""
    programerr = false;
    if (sumh != 100) err = "Ошибка в программе - объем головных фракций не равен 100 (" + sumh + ")";
    if (sumb != 100) err = "Ошибка в программе - объем фракции тела не равен 100 (" + sumb + ")";
    if (err !=""){
      //alert(err);
      programerr = true;
    }
//    if (!programerr) {
      prgc = prgc.slice(0, -1);
      prgo = prgo.slice(0, -1);
      document.getElementById("WProgram1").value = prgo;
      document.getElementById("WProgram").value = prgc;
//    }
    return programerr;
}

function prep_calc(){
    var volume = SamovarApp.validateNumericInput('vless', {
      label: 'Объём спирта-сырца', min: 0.001, max: 10000
    });
    if (!volume.ok) {
      SamovarApp.showRequestError(volume.error);
      return false;
    }
    var vless = volume.number; //A3
    var vlssp = document.getElementById('vlssp').value / 100; //B3
    var vlp = document.getElementById('vlp').value / 100; //B5
    var vlhp = document.getElementById('vlhp').value / 100; //E3
    var vltp = document.getElementById('vltp').value / 100; //H3
    var tas = vless * vlssp; //С3
    var pas = tas / vlp; //С5
    var thv = tas * vlhp //F3
    phv = thv / vlp; //F5
    var ttv = tas * vltp; //I3
    ptv = ttv / vlp * 2; //I5
    var tht = ttv + thv; //K3
    var pht = ptv + phv; //K5
    var tbas = tas - tht; //M3
    pbas = tbas / vlp; //M5
    var ttr = vless - tht - tbas; //Q3
    var ptr = (vless - pht - pbas) * 0.9; //Q5
    document.getElementById('trest').value = ptr.toFixed(2);
    return true;
}

    var e = document.getElementById("prg");
    
    while (e.firstChild) {

    }

      &nbsp;<label id="program-col-speed" class="tooltip">Скорость<span class="tooltiptext">Скорость в литрах в час. Для строки с типом "Пауза" - время паузы в секундах</span></label>
      &nbsp;<label id="program-col-percent" class="tooltip">Процент<span class="tooltiptext">Процент от объема фракции данного типа</span></label>&nbsp;&nbsp;&nbsp;
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<label id="program-col-type" class="tooltip">Тип<span class="tooltiptext">Тип программы. Для режима Пауза время паузы в секундах задается в поле "Скорость"</span></label>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<label id="program-col-power" class="tooltip">${programPwrLabel}<span class="tooltiptext">Напряжение или мощность на регуляторе (зависит от типа используемого регулятора)</span></label>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<label id="program-col-output" class="tooltip">Выход<span class="tooltiptext">Объем отбираемой фракции в данной строке программы</span></label>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<label id="program-col-time" class="tooltip">Время<span class="tooltiptext">Время, необходимое на отбор фракции в данной строке программы</span></label></div>`);
    var p = document.getElementById("WProgram1");
    var arr = p.value.split("\n");
    for (z=0;z<arr.length;z++){

    }

async function set_program(){
  glcalcnum = false;
  var volume = SamovarApp.readNumericInput('vless', {
    label: 'Объём спирта-сырца', min: 0.001, max: 10000
  });
  if (!volume) return;
  calc_program();
  if (programerr) {
    alert("В программе ошибка! Программа не установлена");
    return;
  }
  try {
    let result = await SamovarApp.postProgram(document.forms.mainform);
    if (!result.ok) { alert(result.err || 'Программа не установлена'); return; }
    alert("Программа сохранена.");
  } catch (e) {
    alert('Ошибка сети: ' + e);
  }
};

    prg.after(dl);
  }

  var p = "ptype" + _lnIdx;
  var ptype = document.getElementById(p);
  ptype.value = arr[3];

  var pnum = document.getElementById("pnum" + _lnIdx);
  pnum.selectedIndex = arr[0];
  pnum.onchange = set_num;
  
  set_bgcolor(_lnIdx);
  
  _lnIdx++;
  
  if (calcnum) set_num();
}

function set_bgcolor(obj){
  var l = document.getElementById("prgln" + obj);
  var t = document.getElementById("ptype" + obj).value;
  if (t == "H"){color = "background-color: #80FFFA;";}
  else if (t == "B"){color = "background-color: #B8E6B8;";}
  else if (t == "C"){color = "background-color: #FFF59D;";}
  else if (t == "P"){color = "background-color: #C4C4C4;";}
  else if (t == "T"){color = "background-color: #D8B9A4;";}
  color += "color: #17212B; border-color: #17212B;";
  l.setAttribute("style",color);
  var e = l.childNodes;
  for(q=0;q<e.length;q++){
    e[q].setAttribute("style",color);
  }
  if (glcalcnum) set_num();
}

window.onload = function() {
  SamovarApp.initTheme();
  const heaterPowerInput = document.getElementById('heaterMaxPower');
  if (heaterPowerInput) {
    // Диапазон обязан совпадать с trusted_heater_resistance() (control_numeric_input.h):
    // вне 2..65 Ом прошивка считает не по сохранённому R, поэтому показывать мощность
    // по нему - значит обещать то, чего прошивка не сделает. Гасим поле вместо вранья.
    if (Number.isFinite(heaterResistance) && heaterResistance >= 2 && heaterResistance <= 65) {
      heaterPowerInput.value = String(Math.round(mainsVolt * mainsVolt / heaterResistance));
      heaterPowerInput.disabled = false;
    } else {
      heaterPowerInput.value = '';
      heaterPowerInput.disabled = true;
      SamovarApp.showRequestError('Не получено сопротивление ТЭНа для расчёта программы.');
    }
  }
  const loadProgramSelect = document.getElementById("loadprogram");
  if (loadProgramSelect) {
    getProgramFromFile(loadProgramSelect, { skipConfirm: true });
  }
  
  // Обработчик изменения мощности ТЭНа для пересчета отображения
  if (heaterPowerInput) {
    heaterPowerInput.addEventListener('input', function() {
      // Пересчитываем отображение при каждом изменении (для режима вольт)
      if (columnParams) {
        displayColumnParams();
      }
    });
  }
};

</script>
</head>
<body>
<form action='none' onsubmit='return false' name="mainform" id="mainform">

      <label for="heaterMaxPower">Мощность ТЭНа для расчета:</label> <input type="text" id="heaterMaxPower" value="" disabled onchange="displayColumnParams()" style="width: 70px;"> Вт
    </div>

    <div id="columnParamsResults" style="display: none; background: var(--bg-program-example); border: 1px solid #3498db; padding: 10px; border-radius: 4px;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #ccc; padding-bottom: 5px;">
        <span>Захлёб: <b id="colFloodPower">-</b><span id="floodUnit"> Вт</span></span>
        <span>Рабочая: <b id="colWorkingPower">-</b><span id="workingUnit"> Вт</span></span>

      </div>
      <div id="strategyNote" style="font-size: 0.85em; margin-bottom: 10px; padding: 5px; background: var(--bg-program-example);"></div>
      <input type="button" class="button" value="ПРИМЕНИТЬ РЕКОМЕНДАЦИИ" onclick="applyRecommendedSpeeds()" style="width: 100%; background: var(--accent); color: var(--text-on-accent);">
    </div>
  </div>
</div>

<div class="tabcontent" style="display: block;border-top: solid;border-top-width: 1px;border-top-color: rgb(204, 204, 204);">

<div class="container_row" style="border: 1px dashed #bbb; margin-bottom: 1em;">
<div id="Prog">
<div style="margin-bottom: 10px !important;">
<label for="vless" class="tooltip prgline">Объем спирта-сырца</label><input id='vless' name='vless' type='text' value='12.25' onchange="set_num();"><label class="tooltip prgline">л</label>&nbsp;&nbsp;&nbsp;&nbsp;
<label for="vlssp" class="tooltip prgline">Содержание АС в с-с<span class="tooltiptext">Содержание абсолютного спирта в спирте-сырце в &#37;</span></label><input id='vlssp' type='text' value='34' onchange="set_num();"><label class="tooltip prgline">&#37;</label>&nbsp;&nbsp;&nbsp;&nbsp;
<label for="vlp" class="tooltip prgline">Выход спирта<span class="tooltiptext">Прогнозируемый выход спирта в &#37;</span></label><input id='vlp' type='text' value='94' onchange="set_num();"><label class="tooltip prgline">&#37;</label>
</div>
<div style="margin-top: 10px !important; padding-bottom: 0px !important; margin-bottom: 10px !important;">
<label for="vlhp" class="tooltip prgline">Объем голов<span class="tooltiptext">Прогнозируемый выход голов в &#37;</span></label><input id='vlhp' type='text' value='8' onchange="set_num();"><label class="tooltip prgline">&#37;</label>&nbsp;&nbsp;&nbsp;&nbsp;
<label for="vltp" class="tooltip prgline">Объем хвостов<span class="tooltiptext">Прогнозируемый выход хвостов в &#37;</span></label><input id='vltp' type='text' value='5' onchange="set_num();"><label class="tooltip prgline">&#37;</label>&nbsp;&nbsp;&nbsp;&nbsp;
<label for="trest" class="tooltip prgline">Кубовый остаток<span class="tooltiptext">Прогнозируемый кубовый остаток после завершения перегонки в литрах</span></label><input id='trest' type='text' value='8' disabled><label class="tooltip prgline">л</label>
</div>
<label class="tooltip prgline" style="margin-top: 10px !important; padding-bottom: 0px !important; margin-bottom: 10px !important;">Информация о параметрах программы отбора
<span class="tooltiptext">
При работе с СС из сахарной браги
<ul>
<li>Колонна максимальной высоты, плотно набитая насадка</li>
<li>Отбор - головы в пленочном режиме, тело в режиме максимального разделения (предзахлеб)</li>
<li>Головы - 10&#37;-15&#37;, хвосты - 5&#37;</li>
</ul>
При работе с СС из фруктов
<ul>
<li>Колонна метр, разреженная насадка</li>
<li>Начало отбора в пленочном режиме</li>
<li>После отбора голов увеличить разделение, но не доводить до предзахлеба</li>
<li>Головы - 8&#37;, хвосты - 5&#37;</li>
<li>Выход спирта - 94&#37;</li>
</ul>
При работе с СС из зерновых
<ul>
<li>Колонна метр, разреженная насадка</li>
<li>Начало отбора в пленочном режиме</li>
<li>После отбора голов увеличить разделение, но не доводить до предзахлеба</li>
<li>Головы - 6-10&#37;, хвосты - 5-7&#37;</li>
<li>Выход спирта - 94&#37;</li>
</ul>
</span></label>
</div>
</div>

<div class="container_row" style="border: 1px dashed #bbb; margin-bottom: 1em;">
